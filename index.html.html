<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4</title>
    <link rel="stylesheet" href="connect4.css">
</head>
<body>

    <h1>Connect 4</h1>

    <!-- Starting screen -->
    <div id="start-screen">
        <p>Choose your color to begin:</p>
        <button onclick="chooseColor('R')">Red</button>
        <button onclick="chooseColor('Y')">Yellow</button>
    </div>

    <!-- Turn indicator -->
    <h3 id="turn"></h3>

    <!-- Winner text -->
    <h2 id="winner"></h2>

    <!-- Game board -->
    <div id="board"></div>

    <script src="connect4.js"></script>
</body>
</html>
